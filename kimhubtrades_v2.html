<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KimHub Traders | Ultimate Trading Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Exo+2:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #050d05; --surface: #091509; --card: #0d1f0d; --card2: #112011;
  --border: #1a3a1a; --border2: #224422;
  --green: #00e676; --green2: #00c853; --green3: #69f0ae; --green-dim: #004d20;
  --red: #ff5252; --red-dim: #4d0000;
  --text: #c8e6c9; --text2: #81c784; --muted: #4a7a4a;
  --font-head: 'Rajdhani', sans-serif; --font-body: 'Exo 2', sans-serif; --font-mono: 'DM Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
a { color: var(--green); text-decoration: none; }

/* ── LOADING SCREEN ── */
#loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
.loader-logo { font-family: var(--font-head); font-size: 3rem; font-weight: 700; letter-spacing: 4px; margin-bottom: 0.5rem; }
.loader-logo span:first-child { color: var(--green); }
.loader-logo span:last-child { color: #ff6b35; }
.loader-sub { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 6px; color: var(--muted); margin-bottom: 2.5rem; text-transform: uppercase; }
.loader-bar-wrap { width: 320px; height: 3px; background: var(--card2); border-radius: 2px; overflow: hidden; margin-bottom: 1rem; }
.loader-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), var(--green3)); border-radius: 2px; transition: width 0.1s linear; }
.loader-status { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text2); letter-spacing: 1px; }
.loader-icons { display: flex; gap: 2rem; margin-top: 2.5rem; }
.loader-icon-item { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; opacity: 0.3; transition: opacity 0.4s ease; }
.loader-icon-item.active { opacity: 1; }
.loader-icon-item i { font-size: 1.5rem; color: var(--green); }
.loader-icon-item span { font-size: 0.65rem; font-family: var(--font-mono); color: var(--muted); letter-spacing: 1px; }

/* ── TICKER BAR ── */
#ticker { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.4rem 0; overflow: hidden; white-space: nowrap; position: relative; }
.ticker-inner { display: inline-flex; gap: 2.5rem; animation: ticker-scroll 40s linear infinite; }
.ticker-item { display: inline-flex; align-items: center; gap: 0.4rem; font-family: var(--font-mono); font-size: 0.78rem; }
.ticker-item .sym { color: var(--text2); font-weight: 500; }
.ticker-item .price { color: var(--text); }
.ticker-item .change.up { color: var(--green); }
.ticker-item .change.down { color: var(--red); }
@keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

/* ── LANDING PAGE ── */
#landing { display: none; min-height: 100vh; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); }
.nav-logo { font-family: var(--font-head); font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
.nav-logo .k { color: var(--green); }
.nav-logo .hub { color: var(--text); }
.nav-logo .trades { color: #ff6b35; }
.nav-links { display: flex; gap: 1.5rem; }
.nav-links a { color: var(--muted); font-size: 0.9rem; font-family: var(--font-body); font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--green); }
.btn-connect { background: var(--green); color: #000; font-family: var(--font-head); font-weight: 700; font-size: 0.95rem; letter-spacing: 1px; border: none; padding: 0.6rem 1.4rem; border-radius: 4px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.btn-connect:hover { background: var(--green2); transform: translateY(-1px); }
.btn-connect:active { transform: translateY(0); }

.hero { text-align: center; padding: 5rem 2rem 4rem; }
.hero-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--green-dim); color: var(--green); font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 2px; padding: 0.3rem 0.9rem; border-radius: 20px; border: 1px solid var(--green2); margin-bottom: 1.5rem; }
.hero-badge i { font-size: 0.6rem; }
.hero h1 { font-family: var(--font-head); font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; letter-spacing: 3px; line-height: 1; margin-bottom: 1rem; }
.hero h1 .line1 { color: var(--text); }
.hero h1 .line2 { color: var(--green); }
.hero p { font-size: 1.05rem; color: var(--muted); max-width: 520px; margin: 0 auto 2.5rem; line-height: 1.6; font-weight: 300; }
.hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn-primary { background: var(--green); color: #000; font-family: var(--font-head); font-weight: 700; font-size: 1rem; letter-spacing: 1px; border: none; padding: 0.8rem 2rem; border-radius: 4px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.btn-primary:hover { background: var(--green2); transform: translateY(-2px); }
.btn-outline { background: transparent; color: var(--green); font-family: var(--font-head); font-weight: 600; font-size: 1rem; letter-spacing: 1px; border: 1px solid var(--green2); padding: 0.8rem 2rem; border-radius: 4px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.btn-outline:hover { background: var(--green-dim); transform: translateY(-2px); }

.stats-bar { display: flex; justify-content: center; gap: 3rem; padding: 2rem; flex-wrap: wrap; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.stat-item { text-align: center; }
.stat-item .num { font-family: var(--font-head); font-size: 2rem; font-weight: 700; color: var(--green); }
.stat-item .lbl { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; font-family: var(--font-mono); }

.features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; padding: 3rem 2rem; max-width: 1100px; margin: 0 auto; }
.feature-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; transition: border-color 0.2s, transform 0.2s; }
.feature-card:hover { border-color: var(--green2); transform: translateY(-3px); }
.feature-icon { width: 48px; height: 48px; background: var(--green-dim); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
.feature-icon i { color: var(--green); font-size: 1.3rem; }
.feature-card h3 { font-family: var(--font-head); font-size: 1.1rem; font-weight: 600; color: var(--green3); margin-bottom: 0.5rem; }
.feature-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }

/* ── DASHBOARD ── */
#dashboard { display: none; }
.dash-layout { display: flex; min-height: 100vh; }

.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1rem 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; overflow-y: auto; }
.sidebar-logo { padding: 0.5rem 1.2rem 1.2rem; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
.sidebar-logo .name { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; }
.sidebar-logo .k { color: var(--green); }
.sidebar-logo .ht { color: #ff6b35; }
.sidebar-logo .live-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--green-dim); color: var(--green); font-size: 0.6rem; font-family: var(--font-mono); padding: 0.15rem 0.5rem; border-radius: 10px; border: 1px solid var(--green2); margin-top: 0.2rem; letter-spacing: 1px; }
.live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.nav-section { padding: 0.3rem 0.8rem; font-size: 0.6rem; color: var(--muted); letter-spacing: 2px; font-family: var(--font-mono); text-transform: uppercase; margin: 0.5rem 0 0.2rem; }
.nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1.2rem; color: var(--muted); font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent; }
.nav-item:hover { color: var(--text); background: var(--card); }
.nav-item.active { color: var(--green); background: var(--green-dim); border-left-color: var(--green); }
.nav-item i { width: 18px; text-align: center; font-size: 1rem; }
.sidebar-bottom { margin-top: auto; padding: 1rem 1.2rem; border-top: 1px solid var(--border); }
.sidebar-account { display: flex; align-items: center; gap: 0.7rem; }
.account-avatar { width: 32px; height: 32px; background: var(--green-dim); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 0.85rem; font-weight: 700; }
.account-info { flex: 1; overflow: hidden; }
.account-name { font-size: 0.8rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.account-type { font-size: 0.65rem; color: var(--muted); font-family: var(--font-mono); }

.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }

.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.7rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar-left { font-family: var(--font-head); font-size: 1.1rem; font-weight: 600; color: var(--text2); }
.topbar-right { display: flex; align-items: center; gap: 1rem; }
.balance-chip { display: flex; align-items: center; gap: 0.5rem; background: var(--card); border: 1px solid var(--border2); border-radius: 4px; padding: 0.4rem 0.9rem; }
.balance-chip .lbl { font-size: 0.7rem; color: var(--muted); font-family: var(--font-mono); }
.balance-chip .amount { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 500; color: var(--green); }
.btn-dep { background: var(--green); color: #000; font-family: var(--font-head); font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; border: none; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; }
.demo
